name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Syncs local main branch directly to Hugging Face Space
          git push --force https://Divs0910:$HF_TOKEN@huggingface.co/spaces/Divs0910/Digi-Biz main
